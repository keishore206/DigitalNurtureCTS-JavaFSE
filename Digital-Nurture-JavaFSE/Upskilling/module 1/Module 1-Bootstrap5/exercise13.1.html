<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Colors</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Dashboard Overview
    </h2>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="bg-primary text-white p-4 rounded text-center">
                <h3>150</h3>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="bg-success text-white p-4 rounded text-center">
                <h3>85</h3>
                <p>Projects</p>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="bg-warning text-dark p-4 rounded text-center">
                <h3>45</h3>
                <p>Pending Tasks</p>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="bg-danger text-white p-4 rounded text-center">
                <h3>12</h3>
                <p>Alerts</p>
            </div>
        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
