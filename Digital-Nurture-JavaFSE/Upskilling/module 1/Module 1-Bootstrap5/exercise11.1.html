<!DOCTYPE html>
<html lang="en">
<head>

    <title>Profile Card</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

   <div class="card" style="width:20rem;">

    <div class="text-center pt-3">

    <div class="card-body text-center">

        </p>

    </div>

</div>

</div>

</html>
