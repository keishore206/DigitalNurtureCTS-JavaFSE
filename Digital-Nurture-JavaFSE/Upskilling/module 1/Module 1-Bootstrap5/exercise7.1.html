<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Typography</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css" />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="display-1">Display 1 Heading</h1>
      <p class="lead">
        This is a lead paragraph. It stands out from normal text.
      </p>
      <p class="text-muted">This text is muted and appears lighter.</p>
      <p class="fw-bold">This text is bold.</p>
      <p class="fst-italic">This text is italic.</p>
      <p class="text-decoration-underline">This text is underlined.</p>
    </div>
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
