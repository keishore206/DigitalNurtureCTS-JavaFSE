<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups and Toggles</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Button Group</h2>
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-primary">
            Left
        </button>
        <button type="button" class="btn btn-primary">
            Middle
        </button>
        <button type="button" class="btn btn-primary">
            Right
        </button>
    </div>
    <hr>
    <h2>Toggle Buttons</h2>
    <div class="btn-group" role="group">
        <input type="checkbox"
               class="btn-check"
               id="html"
               autocomplete="off">
        <label class="btn btn-outline-primary" for="html">
            HTML
        </label>
        <input type="checkbox"
               class="btn-check"
               id="css"
               autocomplete="off">
        <label class="btn btn-outline-success" for="css">
            CSS
        </label>
        <input type="checkbox"
               class="btn-check"
               id="bootstrap"
               autocomplete="off">
        <label class="btn btn-outline-danger" for="bootstrap">
            Bootstrap
        </label>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
