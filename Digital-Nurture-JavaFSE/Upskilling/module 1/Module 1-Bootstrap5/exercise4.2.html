<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Four Column Layout</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row text-center">
        <div class="col-sm-3">
          <div class="bg-primary text-white p-4 border">Column 1</div>
        </div>
        <div class="col-sm-3">
          <div class="bg-success text-white p-4 border">Column 2</div>
        </div>
        <div class="col-sm-3">
          <div class="bg-warning text-dark p-4 border">Column 3</div>
        </div>
        <div class="col-sm-3">
          <div class="bg-danger text-white p-4 border">Column 4</div>
        </div>
      </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
